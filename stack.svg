<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Core Toolkit</title>
  <desc id="desc">A premium glassmorphic technology stack section for Roham Hamidi's GitHub profile.</desc>

  <defs>
    <linearGradient id="panelFill" x1="60" y1="24" x2="1140" y2="406" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050914" stop-opacity="0.24"/>
      <stop offset="0.55" stop-color="#08101D" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#0A1324" stop-opacity="0.12"/>
    </linearGradient>

    <linearGradient id="panelStroke" x1="60" y1="24" x2="1140" y2="406" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DFF3FF" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#7CC7FF" stop-opacity="0.08"/>
    </linearGradient>

    <linearGradient id="innerStroke" x1="84" y1="48" x2="1116" y2="382" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DFF3FF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#7CC7FF" stop-opacity="0.025"/>
    </linearGradient>

    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(160 98) rotate(24) scale(260 160)">
      <stop offset="0" stop-color="#6CB6FF" stop-opacity="0.22"/>
      <stop offset="0.45" stop-color="#7CC7FF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#0A1324" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1015 330) rotate(180) scale(290 180)">
      <stop offset="0" stop-color="#9CDCFE" stop-opacity="0.14"/>
      <stop offset="0.5" stop-color="#7CC7FF" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#0A1324" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="titleGrad" x1="430" y1="0" x2="770" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E6EDF3"/>
      <stop offset="0.5" stop-color="#DFF3FF"/>
      <stop offset="1" stop-color="#9CDCFE"/>
    </linearGradient>

    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7CC7FF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#7CC7FF" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#7CC7FF" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="cardFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#DFF3FF" stop-opacity="0.055"/>
      <stop offset="1" stop-color="#7CC7FF" stop-opacity="0.02"/>
    </linearGradient>

    <linearGradient id="cardStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#DFF3FF" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#7CC7FF" stop-opacity="0.04"/>
    </linearGradient>

    <linearGradient id="iconFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7CC7FF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#9CDCFE" stop-opacity="0.08"/>
    </linearGradient>

    <filter id="panelShadow" x="-20%" y="-25%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000814" flood-opacity="0.55"/>
    </filter>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <filter id="microGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>

    <style>
      .font-display { font-family: "SF Pro Display", "Inter", "Segoe UI Variable Display", "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
      .font-ui { font-family: "SF Pro Text", "Inter", "Segoe UI Variable Text", "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
      .font-mono { font-family: "SF Mono", "JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, monospace; }

      .float-a { animation: floatA 10s ease-in-out infinite; }
      .float-b { animation: floatB 12s ease-in-out infinite; }
      .pulse { animation: pulse 5s ease-in-out infinite; }

      @keyframes floatA {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
      }

      @keyframes floatB {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(7px); }
      }

      @keyframes pulse {
        0%,100% { opacity: 0.5; }
        50% { opacity: 0.95; }
      }
    </style>
  </defs>

  <!-- transparent outside -->

  <!-- main glass panel -->
  <g filter="url(#panelShadow)">
    <rect x="60" y="24" width="1080" height="382" rx="36" fill="url(#panelFill)"/>
    <rect x="60.75" y="24.75" width="1078.5" height="380.5" rx="35.25" stroke="url(#panelStroke)" stroke-width="1.5"/>
    <rect x="76" y="40" width="1048" height="350" rx="28" stroke="url(#innerStroke)" stroke-width="1"/>
  </g>

  <!-- inner ambient lights -->
  <g clip-path="url(#clip)">
    <ellipse cx="160" cy="98" rx="260" ry="160" fill="url(#glowLeft)" filter="url(#softGlow)" class="float-a"/>
    <ellipse cx="1015" cy="330" rx="290" ry="180" fill="url(#glowRight)" filter="url(#softGlow)" class="float-b"/>
  </g>

  <!-- title -->
  <text x="600" y="78" text-anchor="middle" class="font-display" font-size="30" font-weight="700" fill="url(#titleGrad)">
    Core Toolkit
  </text>

  <text x="600" y="103" text-anchor="middle" class="font-ui" font-size="13" font-weight="500" letter-spacing="0.18em" fill="#8FB9D8">
    SYSTEMS · DEVELOPMENT · SECURITY · WEB
  </text>

  <rect x="435" y="118" width="330" height="1.4" rx="0.7" fill="url(#lineGrad)" class="pulse"/>

  <!-- cards row 1 -->
  <!-- Python -->
  <g transform="translate(120 150)">
    <rect x="0" y="0" width="180" height="92" rx="22" fill="url(#cardFill)" stroke="url(#cardStroke)"/>
    <rect x="16" y="16" width="42" height="42" rx="14" fill="url(#iconFill)"/>
    <text x="37" y="43" text-anchor="middle" class="font-mono" font-size="16" font-weight="700" fill="#9CDCFE">py</text>
    <text x="72" y="34" class="font-ui" font-size="18" font-weight="700" fill="#E6EDF3">Python</text>
    <text x="72" y="56" class="font-ui" font-size="12.5" font-weight="500" fill="#8FB9D8">Core programming</text>
    <circle cx="156" cy="24" r="3" fill="#57D364"/>
  </g>

  <!-- Linux -->
  <g transform="translate(320 150)">
    <rect x="0" y="0" width="180" height="92" rx="22" fill="url(#cardFill)" stroke="url(#cardStroke)"/>
    <rect x="16" y="16" width="42" height="42" rx="14" fill="url(#iconFill)"/>
    <text x="37" y="43" text-anchor="middle" class="font-mono" font-size="16" font-weight="700" fill="#9CDCFE">lx</text>
    <text x="72" y="34" class="font-ui" font-size="18" font-weight="700" fill="#E6EDF3">Linux</text>
    <text x="72" y="56" class="font-ui" font-size="12.5" font-weight="500" fill="#8FB9D8">System environment</text>
  </g>

  <!-- Kali -->
  <g transform="translate(520 150)">
    <rect x="0" y="0" width="180" height="92" rx="22" fill="url(#cardFill)" stroke="url(#cardStroke)"/>
    <rect x="16" y="16" width="42" height="42" rx="14" fill="url(#iconFill)"/>
    <text x="37" y="43" text-anchor="middle" class="font-mono" font-size="15" font-weight="700" fill="#9CDCFE">kali</text>
    <text x="72" y="34" class="font-ui" font-size="18" font-weight="700" fill="#E6EDF3">Kali Linux</text>
    <text x="72" y="56" class="font-ui" font-size="12.5" font-weight="500" fill="#8FB9D8">Security workspace</text>
  </g>

  <!-- Bash -->
  <g transform="translate(720 150)">
    <rect x="0" y="0" width="180" height="92" rx="22" fill="url(#cardFill)" stroke="url(#cardStroke)"/>
    <rect x="16" y="16" width="42" height="42" rx="14" fill="url(#iconFill)"/>
    <text x="37" y="43" text-anchor="middle" class="font-mono" font-size="16" font-weight="700" fill="#9CDCFE">$_</text>
    <text x="72" y="34" class="font-ui" font-size="18" font-weight="700" fill="#E6EDF3">Bash</text>
    <text x="72" y="56" class="font-ui" font-size="12.5" font-weight="500" fill="#8FB9D8">Terminal workflow</text>
  </g>

  <!-- Git -->
  <g transform="translate(920 150)">
    <rect x="0" y="0" width="160" height="92" rx="22" fill="url(#cardFill)" stroke="url(#cardStroke)"/>
    <rect x="16" y="16" width="42" height="42" rx="14" fill="url(#iconFill)"/>
    <text x="37" y="43" text-anchor="middle" class="font-mono" font-size="16" font-weight="700" fill="#9CDCFE">git</text>
    <text x="72" y="34" class="font-ui" font-size="18" font-weight="700" fill="#E6EDF3">Git</text>
    <text x="72" y="56" class="font-ui" font-size="12.5" font-weight="500" fill="#8FB9D8">Version control</text>
  </g>

  <!-- cards row 2 -->
  <!-- GitHub -->
  <g transform="translate(120 262)">
    <rect x="0" y="0" width="180" height="92" rx="22" fill="url(#cardFill)" stroke="url(#cardStroke)"/>
    <rect x="16" y="16" width="42" height="42" rx="14" fill="url(#iconFill)"/>
    <text x="37" y="43" text-anchor="middle" class="font-mono" font-size="13.5" font-weight="700" fill="#9CDCFE">gh</text>
    <text x="72" y="34" class="font-ui" font-size="18" font-weight="700" fill="#E6EDF3">GitHub</text>
    <text x="72" y="56" class="font-ui" font-size="12.5" font-weight="500" fill="#8FB9D8">Projects and repos</text>
  </g>

  <!-- Arduino -->
  <g transform="translate(320 262)">
    <rect x="0" y="0" width="180" height="92" rx="22" fill="url(#cardFill)" stroke="url(#cardStroke)"/>
    <rect x="16" y="16" width="42" height="42" rx="14" fill="url(#iconFill)"/>
    <text x="37" y="43" text-anchor="middle" class="font-mono" font-size="14" font-weight="700" fill="#9CDCFE">io</text>
    <text x="72" y="34" class="font-ui" font-size="18" font-weight="700" fill="#E6EDF3">Arduino</text>
    <text x="72" y="56" class="font-ui" font-size="12.5" font-weight="500" fill="#8FB9D8">Hardware projects</text>
  </g>

  <!-- HTML5 -->
  <g transform="translate(520 262)">
    <rect x="0" y="0" width="180" height="92" rx="22" fill="url(#cardFill)" stroke="url(#cardStroke)"/>
    <rect x="16" y="16" width="42" height="42" rx="14" fill="url(#iconFill)"/>
    <text x="37" y="43" text-anchor="middle" class="font-mono" font-size="14" font-weight="700" fill="#9CDCFE">&lt;5&gt;</text>
    <text x="72" y="34" class="font-ui" font-size="18" font-weight="700" fill="#E6EDF3">HTML5</text>
    <text x="72" y="56" class="font-ui" font-size="12.5" font-weight="500" fill="#8FB9D8">Structure and markup</text>
  </g>

  <!-- CSS3 -->
  <g transform="translate(720 262)">
    <rect x="0" y="0" width="180" height="92" rx="22" fill="url(#cardFill)" stroke="url(#cardStroke)"/>
    <rect x="16" y="16" width="42" height="42" rx="14" fill="url(#iconFill)"/>
    <text x="37" y="43" text-anchor="middle" class="font-mono" font-size="14" font-weight="700" fill="#9CDCFE">{ }</text>
    <text x="72" y="34" class="font-ui" font-size="18" font-weight="700" fill="#E6EDF3">CSS3</text>
    <text x="72" y="56" class="font-ui" font-size="12.5" font-weight="500" fill="#8FB9D8">Interface styling</text>
  </g>

  <!-- center summary card -->
  <g transform="translate(920 262)">
    <rect x="0" y="0" width="160" height="92" rx="22" fill="url(#cardFill)" stroke="url(#cardStroke)"/>
    <text x="20" y="30" class="font-mono" font-size="12.5" font-weight="600" fill="#8FB9D8">$ stack</text>
    <text x="20" y="52" class="font-ui" font-size="16" font-weight="700" fill="#E6EDF3">9 tools</text>
    <text x="20" y="72" class="font-ui" font-size="12.5" font-weight="500" fill="#8FB9D8">Practical, daily-use setup</text>
  </g>

  <!-- tiny lights -->
  <circle cx="104" cy="54" r="3.5" fill="#7CC7FF" opacity="0.8"/>
  <circle cx="1098" cy="372" r="3.5" fill="#9CDCFE" opacity="0.65"/>
  <circle cx="1084" cy="62" r="2.8" fill="#DFF3FF" opacity="0.5"/>
  <circle cx="98" cy="360" r="2.8" fill="#8FB9D8" opacity="0.42"/>

  <defs>
    <clipPath id="clip">
      <rect x="60" y="24" width="1080" height="382" rx="36"/>
    </clipPath>
  </defs>
</svg>
