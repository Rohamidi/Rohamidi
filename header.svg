<!-- Left floating neuron network -->
<g opacity="0.70">
  <g transform="translate(0 0)">
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0 0; 8 -5; 5 6; -4 3; 0 0"
      dur="18s"
      repeatCount="indefinite"
      calcMode="spline"
      keyTimes="0;0.25;0.55;0.8;1"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>

    <g stroke="url(#networkStroke)" stroke-width="1.15" stroke-linecap="round" stroke-linejoin="round">
      <path d="M146 102L190 120L164 154L214 176L256 148L230 108L190 120"/>
      <path d="M230 108L276 94L308 126L256 148"/>
      <path d="M164 154L128 182L170 206L214 176L252 206"/>
    </g>

    <g fill="#DFF3FF">
      <circle cx="146" cy="102" r="3.1" filter="url(#microGlow)"/>
      <circle cx="190" cy="120" r="3.1" filter="url(#microGlow)"/>
      <circle cx="164" cy="154" r="3.1" filter="url(#microGlow)"/>
      <circle cx="214" cy="176" r="3.1" filter="url(#microGlow)"/>
      <circle cx="256" cy="148" r="3.1" filter="url(#microGlow)"/>
      <circle cx="230" cy="108" r="3.1" filter="url(#microGlow)"/>
      <circle cx="276" cy="94" r="3.1" fill="#9CDCFE" filter="url(#microGlow)"/>
      <circle cx="308" cy="126" r="3.1" fill="#9CDCFE" filter="url(#microGlow)"/>
      <circle cx="128" cy="182" r="3.1" fill="#9CDCFE" filter="url(#microGlow)"/>
      <circle cx="170" cy="206" r="3.1" fill="#9CDCFE" filter="url(#microGlow)"/>
      <circle cx="252" cy="206" r="3.1" fill="#9CDCFE" filter="url(#microGlow)"/>
    </g>

    <circle cx="190" cy="120" r="10" fill="#7CC7FF" fill-opacity="0.10">
      <animate attributeName="r" values="7;11.5;7" dur="5.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.16;0.04;0.16" dur="5.2s" repeatCount="indefinite"/>
    </circle>

    <circle cx="214" cy="176" r="7.5" fill="#DFF3FF" fill-opacity="0.05">
      <animate attributeName="r" values="5.5;8.5;5.5" dur="6.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.10;0.025;0.10" dur="6.4s" repeatCount="indefinite"/>
    </circle>
  </g>
</g>

<!-- Right floating neuron network -->
