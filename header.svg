<svg width="1200" height="220" viewBox="0 0 1200 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Roham Hamidi GitHub Profile Header</title>
  <desc id="desc">Premium GitHub profile header matched to the terminal frame, with a cleaner top bar, bolder name styling, and simplified text.</desc>

  <defs>
    <!-- exact terminal.svg shell -->
    <linearGradient id="bg" x1="120" y1="0" x2="1080" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050914"/>
      <stop offset="1" stop-color="#0A1324"/>
    </linearGradient>

    <linearGradient id="stroke" x1="120" y1="20" x2="1080" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DFF3FF" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#7CC7FF" stop-opacity="0.08"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-40%" width="140%" height="200%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000814" flood-opacity="0.55"/>
    </filter>

    <!-- subtle internal lighting adapted from the old header -->
    <radialGradient id="orbLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(230 92) rotate(18) scale(280 120)">
      <stop offset="0" stop-color="#6CB6FF" stop-opacity="0.22"/>
      <stop offset="0.45" stop-color="#7CC7FF" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#0A1324" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orbRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(970 146) rotate(180) scale(260 110)">
      <stop offset="0" stop-color="#9CDCFE" stop-opacity="0.14"/>
      <stop offset="0.5" stop-color="#7CC7FF" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#0A1324" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="centerGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 110) rotate(90) scale(86 520)">
      <stop offset="0" stop-color="#DFF3FF" stop-opacity="0.08"/>
      <stop offset="0.55" stop-color="#7CC7FF" stop-opacity="0.03"/>
      <stop offset="1" stop-color="#7CC7FF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="nameBase" x1="360" y1="70" x2="850" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E6EDF3"/>
      <stop offset="0.48" stop-color="#DFF3FF"/>
      <stop offset="1" stop-color="#9CDCFE"/>
    </linearGradient>

    <linearGradient id="nameFlow" x1="280" y1="64" x2="900" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E6EDF3"/>
      <stop offset="0.16" stop-color="#DFF3FF"/>
      <stop offset="0.34" stop-color="#9CDCFE"/>
      <stop offset="0.50" stop-color="#E6EDF3"/>
      <stop offset="0.70" stop-color="#6CB6FF"/>
      <stop offset="0.86" stop-color="#DFF3FF"/>
      <stop offset="1" stop-color="#E6EDF3"/>
      <animate attributeName="x1" values="250;760;250" dur="7.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" keyTimes="0;0.5;1"/>
      <animate attributeName="x2" values="870;1380;870" dur="7.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" keyTimes="0;0.5;1"/>
    </linearGradient>

    <linearGradient id="subtitleGrad" x1="420" y1="148" x2="780" y2="148" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B6C9D9"/>
      <stop offset="1" stop-color="#8FB9D8"/>
    </linearGradient>

    <linearGradient id="chipFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#DFF3FF" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#7CC7FF" stop-opacity="0.025"/>
    </linearGradient>

    <filter id="blurXL" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="24"/>
    </filter>

    <filter id="nameGlow" x="-30%" y="-80%" width="160%" height="280%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <filter id="microGlow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4"/>
    </filter>

    <clipPath id="panelClip">
      <rect x="60" y="20" width="1080" height="180" rx="22"/>
    </clipPath>

    <style>
      .font-display { font-family: "SF Pro Display", "Inter", "Segoe UI Variable Display", "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
      .font-ui { font-family: "SF Pro Text", "Inter", "Segoe UI Variable Text", "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
      .font-mono { font-family: "SF Mono", "JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, monospace; }
      .caps { letter-spacing: 0.18em; }
    </style>
  </defs>

  <!-- exact terminal.svg container -->
  <g filter="url(#shadow)">
    <rect x="60" y="20" width="1080" height="180" rx="22" fill="url(#bg)"/>
    <rect x="60.75" y="20.75" width="1078.5" height="178.5" rx="21.25" stroke="url(#stroke)" stroke-width="1.5"/>
  </g>

  <g clip-path="url(#panelClip)">
    <!-- ambient lighting -->
    <rect x="60" y="20" width="1080" height="180" rx="22" fill="url(#centerGlow)" opacity="0.9">
      <animate attributeName="opacity" values="0.72;0.95;0.72" dur="10s" repeatCount="indefinite"/>
    </rect>

    <ellipse cx="230" cy="92" rx="230" ry="96" fill="url(#orbLeft)" filter="url(#blurXL)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 10 -6; 0 0" dur="14s" repeatCount="indefinite"/>
    </ellipse>

    <ellipse cx="970" cy="146" rx="220" ry="92" fill="url(#orbRight)" filter="url(#blurXL)">
      <animateTransform attributeName="transform" type="translate" values="0 0; -10 6; 0 0" dur="16s" repeatCount="indefinite"/>
    </ellipse>

    <g opacity="0.08">
      <path d="M806 34C904 70 982 118 1062 176" stroke="#8FB9D8" stroke-width="1"/>
      <path d="M118 168C252 144 404 136 566 138" stroke="#6CB6FF" stroke-width="1"/>
      <path d="M642 176C784 162 920 146 1068 96" stroke="#DFF3FF" stroke-opacity="0.65" stroke-width="1"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 3 -2; 0 0" dur="18s" repeatCount="indefinite"/>
    </g>

    <!-- floating chips -->
    <g opacity="0.46">
      <g transform="translate(220 104)">
        <rect x="-42" y="-16" width="84" height="32" rx="14" fill="url(#chipFill)" stroke="#DFF3FF" stroke-opacity="0.07"/>
        <text x="0" y="6" text-anchor="middle" class="font-mono" font-size="16" font-weight="600" fill="#9CDCFE" fill-opacity="0.66">&lt;/&gt;</text>
      </g>

      <g transform="translate(982 106)">
        <rect x="-36" y="-16" width="72" height="32" rx="14" fill="url(#chipFill)" stroke="#DFF3FF" stroke-opacity="0.07"/>
        <text x="0" y="6" text-anchor="middle" class="font-mono" font-size="16" font-weight="600" fill="#9CDCFE" fill-opacity="0.64">{ }</text>
      </g>
    </g>

    <!-- decorative dots -->
    <g opacity="0.66">
      <circle cx="300" cy="78" r="3.2" fill="#E6EDF3" filter="url(#microGlow)">
        <animate attributeName="cy" values="78;70;78" dur="7.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="930" cy="150" r="3.2" fill="#DFF3FF" filter="url(#microGlow)">
        <animate attributeName="cy" values="150;142;150" dur="7.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="980" cy="92" r="2.8" fill="#9CDCFE" filter="url(#microGlow)">
        <animate attributeName="cx" values="980;972;980" dur="9s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- title -->
    <g filter="url(#nameGlow)" opacity="0.19">
      <text x="600" y="112" text-anchor="middle" fill="#7CC7FF" font-size="56" font-weight="820" class="font-display" letter-spacing="0.008em">Roham Hamidi</text>
      <animate attributeName="opacity" values="0.15;0.26;0.15" dur="8s" repeatCount="indefinite"/>
    </g>

    <text x="600" y="112" text-anchor="middle" fill="url(#nameBase)" font-size="56" font-weight="820" class="font-display" letter-spacing="0.008em">Roham Hamidi</text>
    <text x="600" y="112" text-anchor="middle" fill="url(#nameFlow)" opacity="0.92" font-size="56" font-weight="820" class="font-display" letter-spacing="0.008em">Roham Hamidi</text>

    <text x="600" y="154" text-anchor="middle" dominant-baseline="middle" fill="url(#subtitleGrad)" font-size="14" font-weight="650" class="font-ui caps">SOFTWARE ENGINEERING  •  CYBERSECURITY  •  Machiine Learning</text>

    <g opacity="0.16">
      <path d="M340 164H492" stroke="#7CC7FF" stroke-opacity="0.16" stroke-width="1.1"/>
      <path d="M708 164H860" stroke="#7CC7FF" stroke-opacity="0.16" stroke-width="1.1"/>
      <circle cx="510" cy="164" r="2.5" fill="#6CB6FF" fill-opacity="0.74">
        <animate attributeName="opacity" values="0.38;0.82;0.38" dur="5.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="690" cy="164" r="2.5" fill="#DFF3FF" fill-opacity="0.72">
        <animate attributeName="opacity" values="0.36;0.84;0.36" dur="6.4s" repeatCount="indefinite"/>
      </circle>
    </g>

  </g>
</svg>
