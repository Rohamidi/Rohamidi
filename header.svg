<svg width="1600" height="620" viewBox="0 0 1600 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Roham Hamidi GitHub Profile Header</title>
  <desc id="desc">A premium modern iOS-inspired GitHub profile header with a transparent outer background, glassmorphism, subtle programming symbols, and smooth animated lighting.</desc>

  <defs>
    <radialGradient id="orbLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 170) rotate(28) scale(560 360)">
      <stop offset="0" stop-color="#69C6FF" stop-opacity="0.34"/>
      <stop offset="0.42" stop-color="#2196F3" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#0D47A1" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orbRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1348 470) rotate(180) scale(540 340)">
      <stop offset="0" stop-color="#B4ECFF" stop-opacity="0.18"/>
      <stop offset="0.48" stop-color="#42A5F5" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#42A5F5" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="centerGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(800 310) rotate(90) scale(320 900)">
      <stop offset="0" stop-color="#E2F7FF" stop-opacity="0.10"/>
      <stop offset="0.50" stop-color="#7BCFFF" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#7BCFFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="panelFill" x1="250" y1="48" x2="1390" y2="572" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A1223" stop-opacity="0.24"/>
      <stop offset="0.5" stop-color="#0A1223" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#0A1223" stop-opacity="0.12"/>
    </linearGradient>

    <linearGradient id="panelStroke" x1="220" y1="50" x2="1380" y2="570" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F4FCFF" stop-opacity="0.30"/>
      <stop offset="0.26" stop-color="#B4E9FF" stop-opacity="0.18"/>
      <stop offset="0.62" stop-color="#69C6FF" stop-opacity="0.11"/>
      <stop offset="1" stop-color="#9CD9FF" stop-opacity="0.08"/>
    </linearGradient>

    <linearGradient id="innerStroke" x1="300" y1="82" x2="1300" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.02"/>
    </linearGradient>

    <linearGradient id="subtitleGrad" x1="520" y1="420" x2="1080" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E0F6FF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#A8DDFF" stop-opacity="0.88"/>
    </linearGradient>

    <linearGradient id="nameBase" x1="420" y1="220" x2="1180" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FDFF"/>
      <stop offset="0.48" stop-color="#E5F6FF"/>
      <stop offset="1" stop-color="#B7E6FF"/>
    </linearGradient>

    <linearGradient id="nameFlow" x1="180" y1="218" x2="1180" y2="436" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FDFF"/>
      <stop offset="0.18" stop-color="#DDF4FF"/>
      <stop offset="0.36" stop-color="#7FD1FF"/>
      <stop offset="0.52" stop-color="#F4FCFF"/>
      <stop offset="0.70" stop-color="#55BCFF"/>
      <stop offset="0.86" stop-color="#DDF4FF"/>
      <stop offset="1" stop-color="#F8FDFF"/>
      <animate attributeName="x1" values="140;900;140" dur="7.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" keyTimes="0;0.5;1"/>
      <animate attributeName="x2" values="1040;1800;1040" dur="7.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" keyTimes="0;0.5;1"/>
      <animate attributeName="y1" values="218;234;218" dur="7.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" keyTimes="0;0.5;1"/>
      <animate attributeName="y2" values="436;450;436" dur="7.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" keyTimes="0;0.5;1"/>
    </linearGradient>

    <linearGradient id="nameSweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.46" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.75"/>
      <stop offset="0.54" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="codePill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.025"/>
    </linearGradient>

    <filter id="blurXXL" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="66"/>
    </filter>

    <filter id="blurXL" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="34"/>
    </filter>

    <filter id="panelShadow" x="-20%" y="-25%" width="140%" height="155%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="34" flood-color="#00050D" flood-opacity="0.45"/>
    </filter>

    <filter id="glowSoft" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#83D3FF" flood-opacity="0.12"/>
    </filter>

    <filter id="nameGlow" x="-30%" y="-70%" width="160%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="14"/>
    </filter>

    <filter id="microGlow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5"/>
    </filter>

    <clipPath id="panelClip">
      <rect x="210" y="48" width="1180" height="524" rx="52"/>
    </clipPath>

    <mask id="nameSweepMask">
      <rect x="0" y="0" width="1600" height="620" fill="black"/>
      <rect x="-440" y="0" width="320" height="620" fill="url(#nameSweep)" transform="rotate(14 0 0)">
        <animateTransform attributeName="transform" type="translate" values="0 0; 2140 0" dur="6.8s" repeatCount="indefinite"/>
      </rect>
    </mask>

    <style>
      .font-display { font-family: "SF Pro Display", "Inter", "Segoe UI Variable Display", "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
      .font-ui { font-family: "SF Pro Text", "Inter", "Segoe UI Variable Text", "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
      .font-mono { font-family: "SF Mono", "JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, monospace; }
      .caps { letter-spacing: 0.18em; }
    </style>
  </defs>

  <!-- transparent outer canvas -->
  <!-- no full background rect -->

  <g filter="url(#panelShadow)">
    <rect x="210" y="48" width="1180" height="524" rx="52" fill="url(#panelFill)"/>
    <rect x="210" y="48" width="1180" height="524" rx="52" fill="url(#centerGlow)">
      <animate attributeName="opacity" values="0.72;0.95;0.72" dur="10s" repeatCount="indefinite"/>
    </rect>
    <rect x="210.8" y="48.8" width="1178.4" height="522.4" rx="51.2" stroke="url(#panelStroke)" stroke-width="1.6"/>
    <rect x="228" y="66" width="1144" height="488" rx="40" stroke="url(#innerStroke)" stroke-width="1"/>
  </g>

  <g clip-path="url(#panelClip)">
    <!-- ambient glows now live inside the glass card -->
    <ellipse cx="260" cy="170" rx="390" ry="260" fill="url(#orbLeft)" filter="url(#blurXXL)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 18 -12; 0 0" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.84;1;0.84" dur="14s" repeatCount="indefinite"/>
    </ellipse>

    <ellipse cx="1348" cy="470" rx="370" ry="240" fill="url(#orbRight)" filter="url(#blurXXL)">
      <animateTransform attributeName="transform" type="translate" values="0 0; -16 12; 0 0" dur="16s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.78;0.96;0.78" dur="16s" repeatCount="indefinite"/>
    </ellipse>

    <ellipse cx="520" cy="98" rx="268" ry="92" fill="#E6F8FF" fill-opacity="0.06" filter="url(#blurXL)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 24 8; 0 0" dur="16s" repeatCount="indefinite"/>
    </ellipse>

    <ellipse cx="1134" cy="534" rx="296" ry="120" fill="#70C6FF" fill-opacity="0.08" filter="url(#blurXL)">
      <animateTransform attributeName="transform" type="translate" values="0 0; -18 -10; 0 0" dur="17s" repeatCount="indefinite"/>
    </ellipse>

    <g opacity="0.14">
      <path d="M1000 60C1132 146 1202 234 1292 364" stroke="#A7DEFF" stroke-width="1.1"/>
      <path d="M928 548C1094 414 1194 322 1300 172" stroke="#56B8FF" stroke-width="1.1"/>
      <path d="M434 152C590 178 722 186 884 174" stroke="#D6F2FF" stroke-opacity="0.8" stroke-width="1"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 6 -4; 0 0" dur="18s" repeatCount="indefinite"/>
    </g>

    <g opacity="0.06">
      <path d="M250 310H1350" stroke="#82CEFF" stroke-width="1"/>
      <path d="M800 74V550" stroke="#82CEFF" stroke-width="1"/>
      <animate attributeName="opacity" values="0.04;0.09;0.04" dur="8s" repeatCount="indefinite"/>
    </g>

    <g transform="translate(800 104)" filter="url(#glowSoft)">
      <rect x="-84" y="-24" width="168" height="48" rx="20" fill="#0D182E" fill-opacity="0.30" stroke="#D8F3FF" stroke-opacity="0.10"/>
      <circle cx="-36" cy="0" r="6" fill="#E4F7FF"/>
      <rect x="-14" y="-4" width="66" height="8" rx="4" fill="#9ED8FF" fill-opacity="0.62"/>
      <animateTransform attributeName="transform" type="translate" values="800 104; 810 108; 800 104" dur="10s" repeatCount="indefinite"/>
    </g>

    <g opacity="0.52">
      <g transform="translate(356 178)">
        <rect x="-52" y="-20" width="104" height="40" rx="16" fill="url(#codePill)" stroke="#D8F3FF" stroke-opacity="0.07"/>
        <text x="0" y="7" text-anchor="middle" class="font-mono" font-size="21" font-weight="600" fill="#CFEFFF" fill-opacity="0.66">&lt;/&gt;</text>
      </g>

      <g transform="translate(1240 176)">
        <rect x="-46" y="-20" width="92" height="40" rx="16" fill="url(#codePill)" stroke="#D8F3FF" stroke-opacity="0.07"/>
        <text x="0" y="7" text-anchor="middle" class="font-mono" font-size="21" font-weight="600" fill="#CFEFFF" fill-opacity="0.64">{ }</text>
      </g>

      <g transform="translate(324 454)">
        <text x="0" y="0" class="font-mono" font-size="22" font-weight="600" fill="#AEE1FF" fill-opacity="0.22">//</text>
      </g>

      <g transform="translate(1262 456)">
        <text x="0" y="0" class="font-mono" font-size="20" font-weight="600" fill="#AEE1FF" fill-opacity="0.20">[ ]</text>
      </g>
    </g>

    <g opacity="0.68">
      <circle cx="438" cy="146" r="4" fill="#F0FBFF" filter="url(#microGlow)">
        <animate attributeName="cy" values="146;136;146" dur="7.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.40;0.88;0.40" dur="7.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1228" cy="450" r="4" fill="#E7F8FF" filter="url(#microGlow)">
        <animate attributeName="cy" values="450;436;450" dur="7.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.38;0.82;0.38" dur="7.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1288" cy="288" r="3.8" fill="#DFF6FF" filter="url(#microGlow)">
        <animate attributeName="cx" values="1288;1278;1288" dur="9.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.20;0.62;0.20" dur="9.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="316" cy="236" r="3.4" fill="#AEE1FF" filter="url(#microGlow)">
        <animate attributeName="cx" values="316;328;316" dur="8.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.18;0.54;0.18" dur="8.8s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g filter="url(#nameGlow)" opacity="0.20">
      <text x="800" y="344" text-anchor="middle" fill="#8FD6FF" font-size="126" font-weight="780" class="font-display">Roham Hamidi</text>
      <animate attributeName="opacity" values="0.16;0.26;0.16" dur="8.2s" repeatCount="indefinite"/>
    </g>

    <text x="800" y="344" text-anchor="middle" fill="url(#nameBase)" font-size="126" font-weight="780" class="font-display" letter-spacing="0.01em">Roham Hamidi</text>
    <text x="800" y="344" text-anchor="middle" fill="url(#nameFlow)" opacity="0.90" font-size="126" font-weight="780" class="font-display" letter-spacing="0.01em">Roham Hamidi</text>
    <text x="800" y="344" text-anchor="middle" fill="#FFFFFF" opacity="0.24" mask="url(#nameSweepMask)" font-size="126" font-weight="780" class="font-display" letter-spacing="0.01em">Roham Hamidi</text>

    <text x="800" y="424" text-anchor="middle" fill="url(#subtitleGrad)" font-size="25" font-weight="560" class="font-ui caps">SOFTWARE ENGINEERING  •  CYBERSECURITY  •  DIGITAL SYSTEMS</text>

    <g opacity="0.16">
      <path d="M486 452H694" stroke="#93D6FF" stroke-opacity="0.16" stroke-width="1.2"/>
      <path d="M906 452H1114" stroke="#93D6FF" stroke-opacity="0.16" stroke-width="1.2"/>
      <circle cx="720" cy="452" r="3.2" fill="#7DCCFF" fill-opacity="0.74">
        <animate attributeName="opacity" values="0.38;0.82;0.38" dur="5.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="880" cy="452" r="3.2" fill="#E4F7FF" fill-opacity="0.72">
        <animate attributeName="opacity" values="0.36;0.84;0.36" dur="6.4s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g opacity="0.10">
      <path d="M552 490C650 506 734 514 800 514C866 514 950 506 1048 490" stroke="#BEE8FF" stroke-width="1.1" stroke-linecap="round">
        <animate attributeName="opacity" values="0.06;0.14;0.06" dur="7.8s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
</svg>
