<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="40%" stop-color="#0A1528"/>
      <stop offset="75%" stop-color="#0E2B4A"/>
      <stop offset="100%" stop-color="#08111F"/>
    </linearGradient>

    <!-- Ambient glow -->
    <radialGradient id="orbLeft" cx="22%" cy="42%" r="52%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#050816" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orbRight" cx="82%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#050816" stop-opacity="0"/>
    </radialGradient>

    <!-- Glass card -->
    <linearGradient id="glassFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.025"/>
    </linearGradient>

    <!-- Accent -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1D4ED8" stop-opacity="0"/>
      <stop offset="25%" stop-color="#3B82F6" stop-opacity="0.95"/>
      <stop offset="75%" stop-color="#7DD3FC" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#7DD3FC" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="accentSoft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1D4ED8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3B82F6" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#1D4ED8" stop-opacity="0"/>
    </linearGradient>

    <!-- Pill fill -->
    <linearGradient id="pillFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1D4ED8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.10"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="nameGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="22" flood-color="#2563EB" flood-opacity="0.22"/>
    </filter>

    <style>
      .fade1 { animation: fadeUp 1s cubic-bezier(.4,0,.2,1) both; }
      .fade2 { animation: fadeUp 1s cubic-bezier(.4,0,.2,1) .18s both; }
      .fade3 { animation: fadeUp 1s cubic-bezier(.4,0,.2,1) .34s both; }
      .fade4 { animation: fadeUp 1s cubic-bezier(.4,0,.2,1) .50s both; }

      .pulseA { animation: pulse 4.2s ease-in-out infinite; }
      .pulseB { animation: pulse 4.2s ease-in-out 2.1s infinite; }
      .blink  { animation: blink 1.15s step-end infinite; }
      .scan   { animation: scan 3.8s linear infinite; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes pulse {
        0%,100% { opacity: .22; }
        50%     { opacity: .58; }
      }

      @keyframes blink {
        0%,100% { opacity: 1; }
        50%     { opacity: 0; }
      }

      @keyframes scan {
        0%   { transform: translateY(-12px); opacity: 0; }
        10%  { opacity: .95; }
        85%  { opacity: .28; }
        100% { transform: translateY(235px); opacity: 0; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)"/>
  <rect width="900" height="300" fill="url(#orbLeft)"/>
  <rect width="900" height="300" fill="url(#orbRight)"/>

  <!-- Subtle grid -->
  <g opacity="0.08">
    <line x1="0" y1="75"  x2="900" y2="75"  stroke="#60A5FA" stroke-width="1"/>
    <line x1="0" y1="150" x2="900" y2="150" stroke="#60A5FA" stroke-width="1"/>
    <line x1="0" y1="225" x2="900" y2="225" stroke="#60A5FA" stroke-width="1"/>

    <line x1="112" y1="0" x2="112" y2="300" stroke="#60A5FA" stroke-width="1"/>
    <line x1="225" y1="0" x2="225" y2="300" stroke="#60A5FA" stroke-width="1"/>
    <line x1="337" y1="0" x2="337" y2="300" stroke="#60A5FA" stroke-width="1"/>
    <line x1="450" y1="0" x2="450" y2="300" stroke="#60A5FA" stroke-width="1"/>
    <line x1="562" y1="0" x2="562" y2="300" stroke="#60A5FA" stroke-width="1"/>
    <line x1="675" y1="0" x2="675" y2="300" stroke="#60A5FA" stroke-width="1"/>
    <line x1="787" y1="0" x2="787" y2="300" stroke="#60A5FA" stroke-width="1"/>
  </g>

  <!-- Scan line -->
  <rect x="50" y="0" width="800" height="1.5" fill="url(#accent)" opacity="0.55" class="scan"/>

  <!-- Main card -->
  <rect x="50" y="34" width="800" height="232" rx="20"
        fill="url(#glassFill)"
        stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"
        filter="url(#cardShadow)"/>

  <!-- Accent borders -->
  <rect x="50" y="34" width="800" height="1.5" rx="1" fill="url(#accent)" opacity="0.95"/>
  <rect x="50" y="264.5" width="800" height="1" rx="1" fill="url(#accentSoft)"/>

  <!-- Corner brackets -->
  <path d="M50,66 L50,34 L84,34"   stroke="#60A5FA" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.75"/>
  <path d="M850,66 L850,34 L816,34" stroke="#60A5FA" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.75"/>
  <path d="M50,234 L50,266 L84,266"   stroke="#60A5FA" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.75"/>
  <path d="M850,234 L850,266 L816,266" stroke="#60A5FA" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.75"/>

  <!-- Corner dots -->
  <circle cx="50"  cy="34"  r="3.5" fill="#60A5FA" opacity="0.7"/>
  <circle cx="850" cy="34"  r="3.5" fill="#60A5FA" opacity="0.7"/>
  <circle cx="50"  cy="266" r="3.5" fill="#60A5FA" opacity="0.7"/>
  <circle cx="850" cy="266" r="3.5" fill="#60A5FA" opacity="0.7"/>

  <!-- Window dots -->
  <circle cx="84" cy="56" r="4.5" fill="#FF5F57" opacity="0.88"/>
  <circle cx="102" cy="56" r="4.5" fill="#FEBC2E" opacity="0.88"/>
  <circle cx="120" cy="56" r="4.5" fill="#28C840" opacity="0.88"/>

  <!-- Top label -->
  <text x="150" y="61"
        font-family="'Courier New', monospace"
        font-size="11.5"
        fill="#7DD3FC"
        opacity="0.62"
        letter-spacing="1">profile.header</text>

  <!-- Name -->
  <text x="450" y="126"
        text-anchor="middle"
        font-family="'Helvetica Neue', 'Segoe UI', Arial, sans-serif"
        font-size="47"
        font-weight="700"
        letter-spacing="-0.6"
        fill="#F8FBFF"
        filter="url(#nameGlow)"
        class="fade1">Roham Hamidi</text>

  <!-- Accent line -->
  <rect x="315" y="141" width="270" height="2" rx="1" fill="url(#accent)" class="fade2"/>

  <!-- Professional subtitle -->
  <text x="450" y="171"
        text-anchor="middle"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="14"
        font-weight="500"
        letter-spacing="1.8"
        fill="#BFDBFE"
        class="fade2">SOFTWARE ENGINEERING · CYBERSECURITY · SYSTEMS DEVELOPMENT</text>

  <!-- Centered pills -->
  <!-- Pill 1 -->
  <rect x="126" y="196" width="124" height="28" rx="14"
        fill="url(#pillFill)" stroke="#60A5FA" stroke-opacity="0.28" stroke-width="1"
        class="fade3"/>
  <text x="188" y="214"
        text-anchor="middle"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="11.5"
        font-weight="600"
        fill="#BFDBFE"
        class="fade3">Tbilisi, Georgia</text>

  <!-- Pill 2 -->
  <rect x="268" y="196" width="148" height="28" rx="14"
        fill="url(#pillFill)" stroke="#60A5FA" stroke-opacity="0.28" stroke-width="1"
        class="fade3"/>
  <text x="342" y="214"
        text-anchor="middle"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="11.5"
        font-weight="600"
        fill="#BFDBFE"
        class="fade3">Cybersecurity</text>

  <!-- Pill 3 -->
  <rect x="434" y="196" width="172" height="28" rx="14"
        fill="url(#pillFill)" stroke="#60A5FA" stroke-opacity="0.28" stroke-width="1"
        class="fade4"/>
  <text x="520" y="214"
        text-anchor="middle"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="11.5"
        font-weight="600"
        fill="#BFDBFE"
        class="fade4">Software Engineering</text>

  <!-- Pill 4 -->
  <rect x="624" y="196" width="150" height="28" rx="14"
        fill="url(#pillFill)" stroke="#60A5FA" stroke-opacity="0.28" stroke-width="1"
        class="fade4"/>
  <text x="699" y="214"
        text-anchor="middle"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="11.5"
        font-weight="600"
        fill="#BFDBFE"
        class="fade4">Systems Development</text>

  <!-- Bottom line -->
  <text x="88" y="246"
        font-family="'Courier New', monospace"
        font-size="12"
        fill="#60A5FA"
        opacity="0.52">$</text>

  <text x="102" y="246"
        font-family="'Courier New', monospace"
        font-size="12"
        fill="#93C5FD"
        opacity="0.82">designing reliable software and secure digital systems</text>

  <text x="490" y="246"
        font-family="'Courier New', monospace"
        font-size="12"
        fill="#60A5FA"
        opacity="0.95"
        class="blink">▌</text>

  <!-- Ambient edge dots -->
  <circle cx="26"  cy="62"  r="2" fill="#60A5FA" class="pulseA"/>
  <circle cx="26"  cy="150" r="2" fill="#38BDF8" class="pulseB"/>
  <circle cx="26"  cy="238" r="2" fill="#60A5FA" class="pulseA"/>

  <circle cx="874" cy="62"  r="2" fill="#38BDF8" class="pulseB"/>
  <circle cx="874" cy="150" r="2" fill="#60A5FA" class="pulseA"/>
  <circle cx="874" cy="238" r="2" fill="#38BDF8" class="pulseB"/>
</svg>
