      <circle cx="958" cy="130" r="3.1" filter="url(#microGlow)"/>
      <circle cx="930" cy="162" r="3.1" fill="#9CDCFE" filter="url(#microGlow)"/>
      <circle cx="968" cy="196" r="3.1" fill="#9CDCFE" filter="url(#microGlow)"/>
      <circle cx="976" cy="98" r="3.1" fill="#9CDCFE" filter="url(#microGlow)"/>
