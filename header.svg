<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Roham Hamidi GitHub Profile Header</title>
  <desc id="desc">A premium animated iOS-inspired GitHub header with a large centered name and a smaller subtitle reading Programming, Hacking, Helping Humanity.</desc>

  <defs>
    <linearGradient id="bg" x1="170" y1="40" x2="1440" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#030711"/>
      <stop offset="0.45" stop-color="#060B18"/>
      <stop offset="1" stop-color="#081B3A"/>
    </linearGradient>

    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(270 118) rotate(25) scale(420 250)">
      <stop offset="0" stop-color="#64B5F6" stop-opacity="0.34"/>
      <stop offset="0.52" stop-color="#1E88E5" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#0D47A1" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1320 392) rotate(180) scale(430 260)">
      <stop offset="0" stop-color="#8AD8FF" stop-opacity="0.26"/>
      <stop offset="0.56" stop-color="#42A5F5" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#42A5F5" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="panelGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(800 104) rotate(90) scale(340 980)">
      <stop offset="0" stop-color="#C7EDFF" stop-opacity="0.12"/>
      <stop offset="0.55" stop-color="#5EBEFF" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#5EBEFF" stop-opacity="0.01"/>
    </radialGradient>

    <linearGradient id="panelStroke" x1="328" y1="78" x2="1272" y2="442" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E4F7FF" stop-opacity="0.38"/>
      <stop offset="0.3" stop-color="#8AD8FF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#90CAF9" stop-opacity="0.12"/>
    </linearGradient>

    <linearGradient id="nameGrad" x1="520" y1="178" x2="1080" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F5FBFF"/>
      <stop offset="0.42" stop-color="#D4F0FF"/>
      <stop offset="1" stop-color="#7DCCFF"/>
    </linearGradient>

    <linearGradient id="subtitleGrad" x1="620" y1="318" x2="980" y2="318" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D9F3FF" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#9ED8FF" stop-opacity="0.88"/>
    </linearGradient>

    <linearGradient id="shine" x1="530" y1="82" x2="1070" y2="438" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.48" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="0.52" stop-color="#FFFFFF" stop-opacity="0.38"/>
      <stop offset="0.56" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <filter id="blurXL" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="56"/>
    </filter>

    <filter id="blurL" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="26"/>
    </filter>

    <filter id="blurM" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="16"/>
    </filter>

    <filter id="panelShadow" x="-20%" y="-25%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="30" flood-color="#01050E" flood-opacity="0.65"/>
    </filter>

    <filter id="nameGlow" x="-25%" y="-50%" width="150%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="12"/>
    </filter>

    <filter id="softGlow" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#76C8FF" flood-opacity="0.18"/>
    </filter>

    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10"/>
    </filter>

    <clipPath id="panelClip">
      <rect x="300" y="70" width="1000" height="380" rx="42"/>
    </clipPath>

    <style>
      .font-display { font-family: "SF Pro Display", "Inter", "Segoe UI Variable Display", "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
      .font-ui { font-family: "SF Pro Text", "Inter", "Segoe UI Variable Text", "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
      .tracking-1 { letter-spacing: 0.09em; }
      .tracking-2 { letter-spacing: 0.24em; }
      .tracking-3 { letter-spacing: 0.12em; }
    </style>
  </defs>

  <rect width="1600" height="520" fill="url(#bg)"/>

  <g opacity="0.95">
    <ellipse cx="270" cy="118" rx="320" ry="214" fill="url(#glowLeft)" filter="url(#blurXL)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 12 -10; 0 0" dur="10s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="1320" cy="392" rx="340" ry="218" fill="url(#glowRight)" filter="url(#blurXL)">
      <animateTransform attributeName="transform" type="translate" values="0 0; -14 10; 0 0" dur="11s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <g opacity="0.16">
    <path d="M94 154H332" stroke="#1565C0" stroke-width="1.2"/>
    <path d="M1268 366H1508" stroke="#1565C0" stroke-width="1.2"/>
    <circle cx="332" cy="154" r="3.2" fill="#42A5F5"/>
    <circle cx="1268" cy="366" r="3.2" fill="#42A5F5"/>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="300" y="70" width="1000" height="380" rx="42" fill="#0A1223" fill-opacity="0.54"/>
    <rect x="300" y="70" width="1000" height="380" rx="42" fill="url(#panelGlow)"/>
    <rect x="300.8" y="70.8" width="998.4" height="378.4" rx="41.2" stroke="url(#panelStroke)" stroke-width="1.6"/>
    <rect x="314" y="84" width="972" height="352" rx="32" stroke="#E3F6FF" stroke-opacity="0.06"/>
  </g>

  <g clip-path="url(#panelClip)">
    <ellipse cx="522" cy="86" rx="210" ry="68" fill="#E2F7FF" fill-opacity="0.08" filter="url(#blurL)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 18 6; 0 0" dur="13s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="1138" cy="428" rx="250" ry="94" fill="#6FC6FF" fill-opacity="0.09" filter="url(#blurL)">
      <animateTransform attributeName="transform" type="translate" values="0 0; -12 -8; 0 0" dur="14s" repeatCount="indefinite"/>
    </ellipse>

    <g opacity="0.24">
      <path d="M1016 44C1140 122 1198 194 1268 310" stroke="#9ED8FF" stroke-opacity="0.22" stroke-width="1.1"/>
      <path d="M954 462C1102 352 1190 284 1282 142" stroke="#4DB2FF" stroke-opacity="0.18" stroke-width="1.1"/>
      <path d="M344 406C470 348 538 302 624 198" stroke="#6FC6FF" stroke-opacity="0.18" stroke-width="1.1"/>
      <path d="M470 120C594 150 714 160 838 152" stroke="#BEE8FF" stroke-opacity="0.14" stroke-width="1"/>
    </g>

    <g opacity="0.85">
      <g transform="translate(1176 136)" filter="url(#softGlow)">
        <rect x="-78" y="-42" width="156" height="84" rx="28" fill="#0C162B" fill-opacity="0.52" stroke="#D8F3FF" stroke-opacity="0.13"/>
        <circle cx="-38" cy="0" r="18" fill="#10203B"/>
        <circle cx="-38" cy="0" r="17.2" stroke="#BDE8FF" stroke-opacity="0.18"/>
        <circle cx="-38" cy="0" r="7" fill="#DDF6FF" fill-opacity="0.92"/>
        <rect x="-6" y="-9" width="54" height="10" rx="5" fill="#E9F8FF" fill-opacity="0.78"/>
        <rect x="-6" y="8" width="34" height="8" rx="4" fill="#7DCCFF" fill-opacity="0.58"/>
        <animateTransform attributeName="transform" type="translate" values="1176 136; 1166 142; 1176 136" dur="9s" repeatCount="indefinite"/>
      </g>

      <g transform="translate(404 364)" filter="url(#softGlow)">
        <rect x="-64" y="-34" width="128" height="68" rx="24" fill="#0B1427" fill-opacity="0.5" stroke="#D8F3FF" stroke-opacity="0.12"/>
        <path d="M-28 0H10" stroke="#EAF8FF" stroke-opacity="0.82" stroke-width="6" stroke-linecap="round"/>
        <path d="M-28 14H28" stroke="#7DCCFF" stroke-opacity="0.58" stroke-width="5" stroke-linecap="round"/>
        <circle cx="-38" cy="-10" r="8" fill="#DDF6FF" fill-opacity="0.88"/>
        <animateTransform attributeName="transform" type="translate" values="404 364; 418 356; 404 364" dur="10.5s" repeatCount="indefinite"/>
      </g>
    </g>

    <g opacity="0.72" filter="url(#blurM)">
      <circle cx="446" cy="124" r="4" fill="#DFF5FF">
        <animate attributeName="cy" values="124;116;124" dur="7.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;0.95;0.5" dur="7.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1168" cy="108" r="3.5" fill="#BCE8FF">
        <animate attributeName="cy" values="108;116;108" dur="8.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.35;0.85;0.35" dur="8.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1218" cy="362" r="4" fill="#DFF5FF">
        <animate attributeName="cy" values="362;350;362" dur="7.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.45;0.9;0.45" dur="7.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="352" cy="294" r="3.2" fill="#BCE8FF">
        <animate attributeName="cy" values="294;302;294" dur="6.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.35;0.78;0.35" dur="6.8s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g opacity="0.13">
      <path d="M320 250H1280" stroke="#82CEFF" stroke-width="1"/>
      <path d="M800 88V432" stroke="#82CEFF" stroke-width="1"/>
    </g>

    <g opacity="0.9">
      <rect x="642" y="132" width="316" height="34" rx="17" fill="#0C172C" fill-opacity="0.58" stroke="#D8F3FF" stroke-opacity="0.13"/>
      <circle cx="666" cy="149" r="3.8" fill="#89D3FF"/>
      <circle cx="681" cy="149" r="3.8" fill="#63BBFF" fill-opacity="0.92"/>
      <circle cx="696" cy="149" r="3.8" fill="#BDE8FF" fill-opacity="0.82"/>
      <text x="821" y="153.5" text-anchor="middle" fill="#DDF4FF" fill-opacity="0.92" font-size="11.8" font-weight="700" class="font-ui tracking-2">SOFTWARE • SECURITY • IMPACT</text>
    </g>

    <g filter="url(#nameGlow)" opacity="0.24">
      <text x="800" y="264" text-anchor="middle" fill="#88D1FF" font-size="96" font-weight="760" class="font-display">Roham Hamidi</text>
    </g>

    <text x="800" y="264" text-anchor="middle" fill="url(#nameGrad)" font-size="92" font-weight="760" class="font-display" letter-spacing="0.01em">Roham Hamidi</text>

    <text x="800" y="312" text-anchor="middle" fill="url(#subtitleGrad)" font-size="24" font-weight="560" class="font-ui tracking-1">Programming  •  Hacking  •  Helping Humanity</text>

    <g opacity="0.68">
      <path d="M560 332H710" stroke="#93D6FF" stroke-opacity="0.18" stroke-width="1.2"/>
      <path d="M890 332H1040" stroke="#93D6FF" stroke-opacity="0.18" stroke-width="1.2"/>
      <circle cx="736" cy="332" r="3.2" fill="#7DCCFF" fill-opacity="0.82"/>
      <circle cx="864" cy="332" r="3.2" fill="#DFF5FF" fill-opacity="0.78"/>
    </g>

    <g opacity="0.16">
      <path d="M570 356C646 370 726 378 800 378C874 378 954 370 1030 356" stroke="#BEE8FF" stroke-width="1.1" stroke-linecap="round"/>
    </g>

    <g opacity="0.34">
      <rect x="238" y="116" width="240" height="1.2" rx="0.6" fill="#86D1FF">
        <animate attributeName="opacity" values="0.12;0.34;0.12" dur="6s" repeatCount="indefinite"/>
      </rect>
      <rect x="1122" y="398" width="240" height="1.2" rx="0.6" fill="#86D1FF">
        <animate attributeName="opacity" values="0.12;0.34;0.12" dur="7s" repeatCount="indefinite"/>
      </rect>
    </g>

    <g opacity="0.24">
      <rect x="-220" y="40" width="190" height="500" transform="rotate(18 0 0)" fill="url(#shine)">
        <animateTransform attributeName="transform" type="translate" values="0 0; 1780 0" dur="8.5s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <rect x="14" y="14" width="1572" height="492" rx="28" stroke="#DDF6FF" stroke-opacity="0.04"/>
</svg>
