    <circle cx="1012" cy="134" r="7.2" fill="#7CC7FF" fill-opacity="0.05">
      <animate attributeName="r" values="5.2;8.2;5.2" dur="6.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.10;0.025;0.10" dur="6.8s" repeatCount="indefinite"/>
    </circle>
  </g>
</g>
