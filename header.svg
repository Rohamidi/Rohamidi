<svg width="1200" height="220" viewBox="0 0 1200 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Roham Hamidi GitHub Profile Header</title>
  <desc id="desc">Premium GitHub profile header with the exact terminal-matched shell and a larger, more visual internal layout.</desc>

  <defs>
    <!-- exact terminal.svg shell -->
    <linearGradient id="bg" x1="120" y1="0" x2="1080" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050914"/>
      <stop offset="1" stop-color="#0A1324"/>
    </linearGradient>

    <linearGradient id="stroke" x1="120" y1="20" x2="1080" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DFF3FF" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#7CC7FF" stop-opacity="0.08"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-40%" width="140%" height="200%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000814" flood-opacity="0.55"/>
    </filter>

    <filter id="blurXL" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="24"/>
    </filter>

    <filter id="nameGlow" x="-30%" y="-80%" width="160%" height="280%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <filter id="microGlow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4"/>
    </filter>

    <radialGradient id="orbLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(232 95) rotate(18) scale(285 122)">
      <stop offset="0" stop-color="#6CB6FF" stop-opacity="0.24"/>
      <stop offset="0.46" stop-color="#7CC7FF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#0A1324" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orbRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(968 144) rotate(180) scale(268 114)">
      <stop offset="0" stop-color="#9CDCFE" stop-opacity="0.16"/>
      <stop offset="0.52" stop-color="#7CC7FF" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#0A1324" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="centerGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 110) rotate(90) scale(92 520)">
      <stop offset="0" stop-color="#DFF3FF" stop-opacity="0.085"/>
      <stop offset="0.54" stop-color="#7CC7FF" stop-opacity="0.032"/>
      <stop offset="1" stop-color="#7CC7FF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="nameBase" x1="360" y1="70" x2="850" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E6EDF3"/>
      <stop offset="0.48" stop-color="#DFF3FF"/>
      <stop offset="1" stop-color="#9CDCFE"/>
    </linearGradient>

    <linearGradient id="nameFlow" x1="280" y1="64" x2="900" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E6EDF3"/>
      <stop offset="0.16" stop-color="#DFF3FF"/>
      <stop offset="0.34" stop-color="#9CDCFE"/>
      <stop offset="0.50" stop-color="#E6EDF3"/>
      <stop offset="0.70" stop-color="#6CB6FF"/>
      <stop offset="0.86" stop-color="#DFF3FF"/>
      <stop offset="1" stop-color="#E6EDF3"/>
      <animate attributeName="x1" values="250;760;250" dur="7.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" keyTimes="0;0.5;1"/>
      <animate attributeName="x2" values="870;1380;870" dur="7.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" keyTimes="0;0.5;1"/>
    </linearGradient>

    <linearGradient id="subtitleGrad" x1="400" y1="154" x2="800" y2="154" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#BFD3E2"/>
      <stop offset="1" stop-color="#8FB9D8"/>
    </linearGradient>

    <linearGradient id="chipFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#DFF3FF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#7CC7FF" stop-opacity="0.03"/>
    </linearGradient>

    <linearGradient id="networkStroke" x1="140" y1="64" x2="1060" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7CC7FF" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#DFF3FF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#7CC7FF" stop-opacity="0.18"/>
    </linearGradient>

    <clipPath id="panelClip">
      <rect x="60" y="20" width="1080" height="180" rx="22"/>
    </clipPath>

    <style>
      .font-display { font-family: "SF Pro Display", "Inter", "Segoe UI Variable Display", "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
      .font-ui { font-family: "SF Pro Text", "Inter", "Segoe UI Variable Text", "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
      .font-mono { font-family: "SF Mono", "JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, monospace; }
      .caps { letter-spacing: 0.18em; }
    </style>
  </defs>

  <g filter="url(#shadow)">
    <rect x="60" y="20" width="1080" height="180" rx="22" fill="url(#bg)"/>
    <rect x="60.75" y="20.75" width="1078.5" height="178.5" rx="21.25" stroke="url(#stroke)" stroke-width="1.5"/>
  </g>

  <g clip-path="url(#panelClip)">
    <rect x="60" y="20" width="1080" height="180" rx="22" fill="url(#centerGlow)" opacity="0.92">
      <animate attributeName="opacity" values="0.72;0.96;0.72" dur="10s" repeatCount="indefinite"/>
    </rect>

    <ellipse cx="232" cy="95" rx="238" ry="100" fill="url(#orbLeft)" filter="url(#blurXL)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 10 -6; 0 0" dur="14s" repeatCount="indefinite"/>
    </ellipse>

    <ellipse cx="968" cy="144" rx="228" ry="98" fill="url(#orbRight)" filter="url(#blurXL)">
      <animateTransform attributeName="transform" type="translate" values="0 0; -10 6; 0 0" dur="16s" repeatCount="indefinite"/>
    </ellipse>

    <!-- subtle framing lines -->
    <g opacity="0.10">
      <path d="M874 38C938 66 1000 116 1072 178" stroke="#8FB9D8" stroke-width="1"/>
      <path d="M868 170C936 156 1000 136 1072 100" stroke="#DFF3FF" stroke-opacity="0.65" stroke-width="1"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 3 -2; 0 0" dur="18s" repeatCount="indefinite"/>
    </g>

    <!-- network constellation left -->
    <g opacity="0.58">
      <g stroke="url(#networkStroke)" stroke-width="1.15" stroke-linecap="round">
        <path d="M146 72L190 90L164 124L214 146L256 118L230 78L190 90"/>
        <path d="M230 78L276 64L308 96L256 118"/>
        <path d="M164 124L128 152L170 176L214 146L252 176"/>
      </g>
      <g fill="#DFF3FF">
        <circle cx="146" cy="72" r="3.1" filter="url(#microGlow)"/>
        <circle cx="190" cy="90" r="3.1" filter="url(#microGlow)"/>
        <circle cx="164" cy="124" r="3.1" filter="url(#microGlow)"/>
        <circle cx="214" cy="146" r="3.1" filter="url(#microGlow)"/>
        <circle cx="256" cy="118" r="3.1" filter="url(#microGlow)"/>
        <circle cx="230" cy="78" r="3.1" filter="url(#microGlow)"/>
        <circle cx="276" cy="64" r="3.1" fill="#9CDCFE" filter="url(#microGlow)"/>
        <circle cx="308" cy="96" r="3.1" fill="#9CDCFE" filter="url(#microGlow)"/>
        <circle cx="128" cy="152" r="3.1" fill="#9CDCFE" filter="url(#microGlow)"/>
        <circle cx="170" cy="176" r="3.1" fill="#9CDCFE" filter="url(#microGlow)"/>
        <circle cx="252" cy="176" r="3.1" fill="#9CDCFE" filter="url(#microGlow)"/>
      </g>
      <circle cx="190" cy="90" r="10" fill="#7CC7FF" fill-opacity="0.10">
        <animate attributeName="r" values="7;12;7" dur="4.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.18;0.04;0.18" dur="4.8s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- network constellation right -->
    <g opacity="0.58">
      <g stroke="url(#networkStroke)" stroke-width="1.15" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1060 66L1018 86L990 120L1038 148L1086 130L1102 92L1060 66"/>
        <path d="M990 120L958 100L930 132L968 166L1038 148"/>
        <path d="M1018 86L976 68L946 84L958 100"/>
        <path d="M976 68L1012 104L1060 66"/>
        <path d="M968 166L1012 104L1086 130"/>
      </g>
      <g fill="#DFF3FF">
        <circle cx="1060" cy="66" r="3.1" filter="url(#microGlow)"/>
        <circle cx="1018" cy="86" r="3.1" filter="url(#microGlow)"/>
        <circle cx="990" cy="120" r="3.1" filter="url(#microGlow)"/>
        <circle cx="1038" cy="148" r="3.1" filter="url(#microGlow)"/>
        <circle cx="1086" cy="130" r="3.1" filter="url(#microGlow)"/>
        <circle cx="1102" cy="92" r="3.1" fill="#9CDCFE" filter="url(#microGlow)"/>
        <circle cx="958" cy="100" r="3.1" filter="url(#microGlow)"/>
        <circle cx="930" cy="132" r="3.1" fill="#9CDCFE" filter="url(#microGlow)"/>
        <circle cx="968" cy="166" r="3.1" fill="#9CDCFE" filter="url(#microGlow)"/>
        <circle cx="976" cy="68" r="3.1" fill="#9CDCFE" filter="url(#microGlow)"/>
        <circle cx="946" cy="84" r="3.1" fill="#9CDCFE" filter="url(#microGlow)"/>
        <circle cx="1012" cy="104" r="3.1" fill="#DFF3FF" filter="url(#microGlow)"/>
      </g>
      <circle cx="1038" cy="148" r="10" fill="#DFF3FF" fill-opacity="0.09">
        <animate attributeName="r" values="8;13;8" dur="5.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.16;0.03;0.16" dur="5.2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- floating chips -->
    <g opacity="0.48">
      <g transform="translate(308 66)">
        <rect x="-38" y="-17" width="76" height="34" rx="15" fill="url(#chipFill)" stroke="#DFF3FF" stroke-opacity="0.08"/>
        <text x="0" y="6" text-anchor="middle" class="font-mono" font-size="16" font-weight="750" fill="#9CDCFE" fill-opacity="0.72">&lt;/&gt;</text>
      </g>

      <g transform="translate(892 68)">
        <rect x="-38" y="-17" width="76" height="34" rx="15" fill="url(#chipFill)" stroke="#DFF3FF" stroke-opacity="0.08"/>
        <text x="0" y="6" text-anchor="middle" class="font-mono" font-size="16" font-weight="750" fill="#9CDCFE" fill-opacity="0.72">{ }</text>
      </g>
    </g>


    <!-- additional premium tech icons -->
    <g opacity="0.34">
      <g transform="translate(228 144)">
        <circle cx="0" cy="0" r="5.2" fill="#9CDCFE" fill-opacity="0.16" stroke="#DFF3FF" stroke-opacity="0.28" stroke-width="1"/>
        <circle cx="28" cy="-16" r="4.4" fill="#9CDCFE" fill-opacity="0.12" stroke="#DFF3FF" stroke-opacity="0.22" stroke-width="1"/>
        <circle cx="34" cy="18" r="4.4" fill="#9CDCFE" fill-opacity="0.12" stroke="#DFF3FF" stroke-opacity="0.22" stroke-width="1"/>
        <path d="M5 -1L23 -12M6 2L24 14M31 -12L33 13" stroke="url(#networkStroke)" stroke-width="1.2" stroke-linecap="round"/>
      </g>

      <g transform="translate(975 146)">
        <rect x="-14" y="-14" width="28" height="28" rx="8" fill="#DFF3FF" fill-opacity="0.04" stroke="#DFF3FF" stroke-opacity="0.18"/>
        <rect x="-7.5" y="-7.5" width="15" height="15" rx="3.5" fill="#9CDCFE" fill-opacity="0.08" stroke="#9CDCFE" stroke-opacity="0.26"/>
        <path d="M0 -14V-22M0 14V22M-14 0H-22M14 0H22M10 -10L16 -16M-10 -10L-16 -16M10 10L16 16M-10 10L-16 16" stroke="#9CDCFE" stroke-opacity="0.26" stroke-width="1.1" stroke-linecap="round"/>
      </g>

      <g transform="translate(1036 58)">
        <path d="M-11 1C-11 -5 -6 -10 0 -10C4 -10 7 -8 9 -5C10 -5 11 -5 12 -5C17 -5 21 -1 21 5C21 10 17 14 12 14H-1C-7 14 -12 10 -12 4C-12 3 -12 2 -11 1Z"
              fill="#DFF3FF" fill-opacity="0.035" stroke="#DFF3FF" stroke-opacity="0.12"/>
        <path d="M-3 7L1 3L5 7M1 3V11" stroke="#9CDCFE" stroke-opacity="0.32" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="-9" cy="10" r="1.8" fill="#9CDCFE" fill-opacity="0.34"/>
        <circle cx="13" cy="10" r="1.8" fill="#9CDCFE" fill-opacity="0.34"/>
      </g>
    </g>

    <!-- central connector arcs -->
    <g opacity="0.28">
      <path d="M392 78C460 64 536 58 600 58C664 58 740 64 808 78" stroke="#7CC7FF" stroke-opacity="0.18" stroke-width="1.15"/>
      <path d="M378 170C456 184 536 190 600 190C664 190 744 184 822 170" stroke="#7CC7FF" stroke-opacity="0.16" stroke-width="1.15"/>
      <circle cx="600" cy="58" r="2.8" fill="#DFF3FF">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="4.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="600" cy="190" r="2.8" fill="#9CDCFE">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="5.4s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- title -->
    <g filter="url(#nameGlow)" opacity="0.20">
      <text x="600" y="113" text-anchor="middle" fill="#7CC7FF" font-size="60" font-weight="840" class="font-display" letter-spacing="0.008em">Roham Hamidi</text>
      <animate attributeName="opacity" values="0.15;0.27;0.15" dur="8s" repeatCount="indefinite"/>
    </g>

    <text x="600" y="113" text-anchor="middle" fill="url(#nameBase)" font-size="60" font-weight="840" class="font-display" letter-spacing="0.008em">Roham Hamidi</text>
    <text x="600" y="113" text-anchor="middle" fill="url(#nameFlow)" opacity="0.94" font-size="60" font-weight="840" class="font-display" letter-spacing="0.008em">Roham Hamidi</text>

    <text x="600" y="154" text-anchor="middle" dominant-baseline="middle" fill="url(#subtitleGrad)" font-size="15" font-weight="690" class="font-ui caps">PROGRAMMER  •  HACKER  •  AI ENTHUSIAST</text>

    <!-- footer connectors -->
    <g opacity="0.18">
      <path d="M338 168H492" stroke="#7CC7FF" stroke-opacity="0.17" stroke-width="1.1"/>
      <path d="M708 168H862" stroke="#7CC7FF" stroke-opacity="0.17" stroke-width="1.1"/>
      <path d="M492 168C520 168 530 158 556 158H644C670 158 680 168 708 168" stroke="#DFF3FF" stroke-opacity="0.16" stroke-width="1.05"/>
      <circle cx="510" cy="168" r="2.6" fill="#6CB6FF" fill-opacity="0.76">
        <animate attributeName="opacity" values="0.36;0.88;0.36" dur="5.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="690" cy="168" r="2.6" fill="#DFF3FF" fill-opacity="0.74">
        <animate attributeName="opacity" values="0.34;0.86;0.34" dur="6.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="600" cy="158" r="2.4" fill="#9CDCFE" fill-opacity="0.72">
        <animate attributeName="opacity" values="0.32;0.9;0.32" dur="5.2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- tiny drifting particles -->
    <g opacity="0.7">
      <circle cx="336" cy="84" r="2.8" fill="#E6EDF3" filter="url(#microGlow)">
        <animate attributeName="cy" values="84;76;84" dur="7.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="870" cy="150" r="2.8" fill="#DFF3FF" filter="url(#microGlow)">
        <animate attributeName="cy" values="150;142;150" dur="7.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="920" cy="96" r="2.6" fill="#9CDCFE" filter="url(#microGlow)">
        <animate attributeName="cx" values="920;912;920" dur="9s" repeatCount="indefinite"/>
      </circle>
      <circle cx="288" cy="148" r="2.5" fill="#9CDCFE" filter="url(#microGlow)">
        <animate attributeName="cx" values="288;296;288" dur="8.6s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
</svg>
