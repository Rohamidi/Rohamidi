<svg width="1200" height="460" viewBox="0 0 1200 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Premium terminal intro</title>
  <desc id="desc">A modern Linux-style terminal intro for Roham Hamidi's GitHub profile.</desc>

  <defs>
    <linearGradient id="bg" x1="120" y1="0" x2="1080" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050914"/>
      <stop offset="1" stop-color="#0A1324"/>
    </linearGradient>

    <linearGradient id="stroke" x1="120" y1="20" x2="1080" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DFF3FF" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#7CC7FF" stop-opacity="0.08"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-40%" width="140%" height="200%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000814" flood-opacity="0.55"/>
    </filter>

    <clipPath id="cmd1">
      <rect x="300" y="82" width="0" height="26" rx="4">
        <animate attributeName="width" values="0;90" dur="0.95s" begin="0.35s" fill="freeze"/>
      </rect>
    </clipPath>

    <clipPath id="cmd2">
      <rect x="300" y="176" width="0" height="26" rx="4">
        <animate attributeName="width" values="0;610" dur="2.1s" begin="2.05s" fill="freeze"/>
      </rect>
    </clipPath>

    <clipPath id="cmd3">
      <rect x="300" y="270" width="0" height="26" rx="4">
        <animate attributeName="width" values="0;115" dur="0.95s" begin="4.75s" fill="freeze"/>
      </rect>
    </clipPath>

    <style>
      .mono {
        font-family: "SF Mono", "JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
      }

      .fade {
        opacity: 0;
        animation: show 0.01s linear forwards;
      }

      .out1 { animation-delay: 1.45s; }
      .prompt2 { animation-delay: 2.05s; }
      .out2 { animation-delay: 4.35s; }
      .prompt3 { animation-delay: 4.75s; }
      .out3 { animation-delay: 5.95s; }
      .prompt4 { animation-delay: 6.30s; }

      .cursor1 {
        animation: blink 1s step-end infinite;
      }

      .cursor2 {
        opacity: 0;
        animation:
          show 0.01s linear 2.05s forwards,
          blink 1s step-end 2.05s infinite;
      }

      .cursor3 {
        opacity: 0;
        animation:
          show 0.01s linear 4.75s forwards,
          blink 1s step-end 4.75s infinite;
      }

      .cursor4 {
        opacity: 0;
        animation:
          show 0.01s linear 6.30s forwards,
          blink 1s step-end 6.30s infinite;
      }

      .hide1 { animation: hide 0.01s linear 1.45s forwards; }
      .hide2 { animation: hide 0.01s linear 4.35s forwards; }
      .hide3 { animation: hide 0.01s linear 5.95s forwards; }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      @keyframes show {
        to { opacity: 1; }
      }

      @keyframes hide {
        to { opacity: 0; }
      }
    </style>
  </defs>

  <g filter="url(#shadow)">
    <rect x="52" y="20" width="1096" height="412" rx="26" fill="url(#bg)"/>
    <rect x="52.75" y="20.75" width="1094.5" height="410.5" rx="25.25" stroke="url(#stroke)" stroke-width="1.5"/>
  </g>

  <circle cx="92" cy="52" r="5.5" fill="#FF5F57"/>
  <circle cx="112" cy="52" r="5.5" fill="#FEBC2E"/>
  <circle cx="132" cy="52" r="5.5" fill="#28C840"/>

  <text x="1096" y="58" text-anchor="end" class="mono" font-size="14" fill="#8FB9D8" opacity="0.72">
    roham@github: ~/intro
  </text>

  <text x="84" y="104" class="mono" font-size="24" font-weight="600" fill="#6CB6FF">roham@github</text>
  <text x="246" y="104" class="mono" font-size="24" fill="#E6EDF3">:</text>
  <text x="262" y="104" class="mono" font-size="24" fill="#57D364">~</text>
  <text x="280" y="104" class="mono" font-size="24" fill="#E6EDF3">$</text>
  <g clip-path="url(#cmd1)">
    <text x="300" y="104" class="mono" font-size="24" fill="#E6EDF3">whoami</text>
  </g>
  <text x="390" y="104" class="mono cursor1 hide1" font-size="24" fill="#E6EDF3">▌</text>

  <text x="116" y="148" class="mono fade out1" font-size="23" font-weight="600" fill="#9CDCFE">
    Roham Hamidi
  </text>

  <g class="fade prompt2">
    <text x="84" y="198" class="mono" font-size="24" font-weight="600" fill="#6CB6FF">roham@github</text>
    <text x="246" y="198" class="mono" font-size="24" fill="#E6EDF3">:</text>
    <text x="262" y="198" class="mono" font-size="24" fill="#57D364">~</text>
    <text x="280" y="198" class="mono" font-size="24" fill="#E6EDF3">$</text>
  </g>
  <g clip-path="url(#cmd2)">
    <text x="300" y="198" class="mono" font-size="24" fill="#E6EDF3">echo "$(curl -s ipinfo.io/city), Georgia"</text>
  </g>
  <text x="920" y="198" class="mono cursor2 hide2" font-size="24" fill="#E6EDF3">▌</text>

  <text x="116" y="242" class="mono fade out2" font-size="23" fill="#C5E1FF">
    Tbilisi, Georgia
  </text>

  <g class="fade prompt3">
    <text x="84" y="292" class="mono" font-size="24" font-weight="600" fill="#6CB6FF">roham@github</text>
    <text x="246" y="292" class="mono" font-size="24" fill="#E6EDF3">:</text>
    <text x="262" y="292" class="mono" font-size="24" fill="#57D364">~</text>
    <text x="280" y="292" class="mono" font-size="24" fill="#E6EDF3">$</text>
  </g>
  <g clip-path="url(#cmd3)">
    <text x="300" y="292" class="mono" font-size="24" fill="#E6EDF3">cat goal.txt</text>
  </g>
  <text x="420" y="292" class="mono cursor3 hide3" font-size="24" fill="#E6EDF3">▌</text>

  <text x="116" y="336" class="mono fade out3" font-size="22.5" fill="#B6C9D9">
    Helping Humanity
  </text>

  <g class="fade prompt4">
    <text x="84" y="368" class="mono" font-size="24" font-weight="600" fill="#6CB6FF">roham@github</text>
    <text x="246" y="368" class="mono" font-size="24" fill="#E6EDF3">:</text>
    <text x="262" y="368" class="mono" font-size="24" fill="#57D364">~</text>
    <text x="280" y="368" class="mono" font-size="24" fill="#E6EDF3">$</text>
    <text x="300" y="368" class="mono cursor4" font-size="24" fill="#E6EDF3">▌</text>
  </g>
</svg>
