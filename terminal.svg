<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Roham Hamidi GitHub Profile Header</title>
  <desc id="desc">A premium modern iOS-inspired GitHub profile header matching the exact width structure of terminal.svg.</desc>

  <defs>
    <!-- exact terminal palette -->
    <radialGradient id="orbLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(180 118) rotate(28) scale(380 235)">
      <stop offset="0" stop-color="#6CB6FF" stop-opacity="0.28"/>
      <stop offset="0.42" stop-color="#7CC7FF" stop-opacity="0.11"/>
      <stop offset="1" stop-color="#0A1324" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orbRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1015 316) rotate(180) scale(360 230)">
      <stop offset="0" stop-color="#9CDCFE" stop-opacity="0.16"/>
      <stop offset="0.48" stop-color="#7CC7FF" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#0A1324" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="centerGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 210) rotate(90) scale(220 640)">
      <stop offset="0" stop-color="#DFF3FF" stop-opacity="0.08"/>
      <stop offset="0.50" stop-color="#7CC7FF" stop-opacity="0.035"/>
      <stop offset="1" stop-color="#7CC7FF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="panelFill" x1="60" y1="24" x2="1140" y2="396" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050914" stop-opacity="0.24"/>
      <stop offset="0.5" stop-color="#08101D" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#0A1324" stop-opacity="0.12"/>
    </linearGradient>

    <linearGradient id="panelStroke" x1="60" y1="24" x2="1140" y2="396" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DFF3FF" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#7CC7FF" stop-opacity="0.08"/>
    </linearGradient>

    <linearGradient id="innerStroke" x1="84" y1="40" x2="1116" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DFF3FF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#7CC7FF" stop-opacity="0.025"/>
    </linearGradient>

    <linearGradient id="subtitleGrad" x1="405" y1="286" x2="795" y2="286" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B6C9D9"/>
      <stop offset="1" stop-color="#8FB9D8"/>
    </linearGradient>

    <linearGradient id="nameBase" x1="330" y1="148" x2="870" y2="286" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E6EDF3"/>
      <stop offset="0.48" stop-color="#DFF3FF"/>
      <stop offset="1" stop-color="#9CDCFE"/>
    </linearGradient>

    <linearGradient id="nameFlow" x1="140" y1="148" x2="860" y2="292" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E6EDF3"/>
      <stop offset="0.18" stop-color="#DFF3FF"/>
      <stop offset="0.36" stop-color="#9CDCFE"/>
      <stop offset="0.52" stop-color="#E6EDF3"/>
      <stop offset="0.70" stop-color="#6CB6FF"/>
      <stop offset="0.86" stop-color="#DFF3FF"/>
      <stop offset="1" stop-color="#E6EDF3"/>
      <animate attributeName="x1" values="120;720;120" dur="7.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" keyTimes="0;0.5;1"/>
      <animate attributeName="x2" values="760;1360;760" dur="7.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" keyTimes="0;0.5;1"/>
    </linearGradient>

    <linearGradient id="nameSweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.46" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.72"/>
      <stop offset="0.54" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="codePill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#DFF3FF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#7CC7FF" stop-opacity="0.025"/>
    </linearGradient>

    <filter id="blurXXL" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="46"/>
    </filter>

    <filter id="blurXL" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="24"/>
    </filter>

    <filter id="panelShadow" x="-20%" y="-25%" width="140%" height="155%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000814" flood-opacity="0.55"/>
    </filter>

    <filter id="glowSoft" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#7CC7FF" flood-opacity="0.12"/>
    </filter>

    <filter id="nameGlow" x="-30%" y="-70%" width="160%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10"/>
    </filter>

    <filter id="microGlow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4"/>
    </filter>

    <clipPath id="panelClip">
      <rect x="60" y="24" width="1080" height="372" rx="36"/>
    </clipPath>

    <mask id="nameSweepMask">
      <rect x="0" y="0" width="1200" height="420" fill="black"/>
      <rect x="-320" y="0" width="240" height="420" fill="url(#nameSweep)" transform="rotate(14 0 0)">
        <animateTransform attributeName="transform" type="translate" values="0 0; 1620 0" dur="6.8s" repeatCount="indefinite"/>
      </rect>
    </mask>

    <style>
      .font-display { font-family: "SF Pro Display", "Inter", "Segoe UI Variable Display", "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
      .font-ui { font-family: "SF Pro Text", "Inter", "Segoe UI Variable Text", "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
      .font-mono { font-family: "SF Mono", "JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, monospace; }
      .caps { letter-spacing: 0.18em; }
    </style>
  </defs>

  <!-- transparent outer canvas -->

  <g filter="url(#panelShadow)">
    <rect x="60" y="24" width="1080" height="372" rx="36" fill="url(#panelFill)"/>
    <rect x="60" y="24" width="1080" height="372" rx="36" fill="url(#centerGlow)">
      <animate attributeName="opacity" values="0.72;0.95;0.72" dur="10s" repeatCount="indefinite"/>
    </rect>
    <rect x="60.75" y="24.75" width="1078.5" height="370.5" rx="35.25" stroke="url(#panelStroke)" stroke-width="1.5"/>
    <rect x="76" y="40" width="1048" height="340" rx="28" stroke="url(#innerStroke)" stroke-width="1"/>
  </g>

  <g clip-path="url(#panelClip)">
    <ellipse cx="180" cy="118" rx="280" ry="180" fill="url(#orbLeft)" filter="url(#blurXXL)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 14 -10; 0 0" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.84;1;0.84" dur="14s" repeatCount="indefinite"/>
    </ellipse>

    <ellipse cx="1015" cy="316" rx="260" ry="170" fill="url(#orbRight)" filter="url(#blurXXL)">
      <animateTransform attributeName="transform" type="translate" values="0 0; -12 10; 0 0" dur="16s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.78;0.96;0.78" dur="16s" repeatCount="indefinite"/>
    </ellipse>

    <ellipse cx="365" cy="76" rx="190" ry="62" fill="#DFF3FF" fill-opacity="0.05" filter="url(#blurXL)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 16 6; 0 0" dur="16s" repeatCount="indefinite"/>
    </ellipse>

    <ellipse cx="840" cy="384" rx="210" ry="78" fill="#7CC7FF" fill-opacity="0.06" filter="url(#blurXL)">
      <animateTransform attributeName="transform" type="translate" values="0 0; -12 -8; 0 0" dur="17s" repeatCount="indefinite"/>
    </ellipse>

    <g opacity="0.12">
      <path d="M820 34C920 98 980 166 1060 266" stroke="#8FB9D8" stroke-width="1"/>
      <path d="M760 394C890 288 968 206 1066 92" stroke="#6CB6FF" stroke-width="1"/>
      <path d="M300 112C420 130 522 136 650 128" stroke="#DFF3FF" stroke-opacity="0.75" stroke-width="1"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 4 -3; 0 0" dur="18s" repeatCount="indefinite"/>
    </g>

    <g opacity="0.05">
      <path d="M90 210H1110" stroke="#7CC7FF" stroke-width="1"/>
      <path d="M600 36V384" stroke="#7CC7FF" stroke-width="1"/>
      <animate attributeName="opacity" values="0.03;0.08;0.03" dur="8s" repeatCount="indefinite"/>
    </g>

    <g transform="translate(600 78)" filter="url(#glowSoft)">
      <rect x="-64" y="-18" width="128" height="36" rx="16" fill="#050914" fill-opacity="0.32" stroke="#DFF3FF" stroke-opacity="0.10"/>
      <circle cx="-26" cy="0" r="5" fill="#E6EDF3"/>
      <rect x="-8" y="-3.5" width="50" height="7" rx="3.5" fill="#7CC7FF" fill-opacity="0.62"/>
      <animateTransform attributeName="transform" type="translate" values="600 78; 608 82; 600 78" dur="10s" repeatCount="indefinite"/>
    </g>

    <g opacity="0.52">
      <g transform="translate(250 132)">
        <rect x="-40" y="-16" width="80" height="32" rx="14" fill="url(#codePill)" stroke="#DFF3FF" stroke-opacity="0.07"/>
        <text x="0" y="6" text-anchor="middle" class="font-mono" font-size="16" font-weight="600" fill="#9CDCFE" fill-opacity="0.66">&lt;/&gt;</text>
      </g>

      <g transform="translate(950 132)">
        <rect x="-36" y="-16" width="72" height="32" rx="14" fill="url(#codePill)" stroke="#DFF3FF" stroke-opacity="0.07"/>
        <text x="0" y="6" text-anchor="middle" class="font-mono" font-size="16" font-weight="600" fill="#9CDCFE" fill-opacity="0.64">{ }</text>
      </g>

      <g transform="translate(220 324)">
        <text x="0" y="0" class="font-mono" font-size="18" font-weight="600" fill="#8FB9D8" fill-opacity="0.22">//</text>
      </g>

      <g transform="translate(972 326)">
        <text x="0" y="0" class="font-mono" font-size="16" font-weight="600" fill="#8FB9D8" fill-opacity="0.20">[ ]</text>
      </g>
    </g>

    <g opacity="0.68">
      <circle cx="310" cy="104" r="3.5" fill="#E6EDF3" filter="url(#microGlow)">
        <animate attributeName="cy" values="104;96;104" dur="7.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.40;0.88;0.40" dur="7.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="924" cy="320" r="3.5" fill="#DFF3FF" filter="url(#microGlow)">
        <animate attributeName="cy" values="320;310;320" dur="7.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.38;0.82;0.38" dur="7.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="970" cy="206" r="3.2" fill="#9CDCFE" filter="url(#microGlow)">
        <animate attributeName="cx" values="970;962;970" dur="9.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.20;0.62;0.20" dur="9.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="214" cy="168" r="3" fill="#8FB9D8" filter="url(#microGlow)">
        <animate attributeName="cx" values="214;222;214" dur="8.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.18;0.54;0.18" dur="8.8s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g filter="url(#nameGlow)" opacity="0.18">
      <text x="600" y="240" text-anchor="middle" fill="#7CC7FF" font-size="86" font-weight="780" class="font-display">Roham Hamidi</text>
      <animate attributeName="opacity" values="0.14;0.24;0.14" dur="8.2s" repeatCount="indefinite"/>
    </g>

    <text x="600" y="240" text-anchor="middle" fill="url(#nameBase)" font-size="86" font-weight="780" class="font-display" letter-spacing="0.01em">Roham Hamidi</text>
    <text x="600" y="240" text-anchor="middle" fill="url(#nameFlow)" opacity="0.90" font-size="86" font-weight="780" class="font-display" letter-spacing="0.01em">Roham Hamidi</text>
    <text x="600" y="240" text-anchor="middle" fill="#FFFFFF" opacity="0.22" mask="url(#nameSweepMask)" font-size="86" font-weight="780" class="font-display" letter-spacing="0.01em">Roham Hamidi</text>

    <text x="600" y="296" text-anchor="middle" fill="url(#subtitleGrad)" font-size="17" font-weight="560" class="font-ui caps">SOFTWARE ENGINEERING  •  CYBERSECURITY  •  DIGITAL SYSTEMS</text>

    <g opacity="0.16">
      <path d="M344 316H492" stroke="#7CC7FF" stroke-opacity="0.16" stroke-width="1.1"/>
      <path d="M708 316H856" stroke="#7CC7FF" stroke-opacity="0.16" stroke-width="1.1"/>
      <circle cx="510" cy="316" r="2.6" fill="#6CB6FF" fill-opacity="0.74">
        <animate attributeName="opacity" values="0.38;0.82;0.38" dur="5.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="690" cy="316" r="2.6" fill="#DFF3FF" fill-opacity="0.72">
        <animate attributeName="opacity" values="0.36;0.84;0.36" dur="6.4s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g opacity="0.10">
      <path d="M396 346C474 358 542 364 600 364C658 364 726 358 804 346" stroke="#B6C9D9" stroke-width="1" stroke-linecap="round">
        <animate attributeName="opacity" values="0.06;0.14;0.06" dur="7.8s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
</svg>
